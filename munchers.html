<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Munchers – Manifest Destined</title>
    <style>
        :root {
            --cardinal: #A30046;
            --cordovan: #4A1326;
            --silver:   #9D9FA2;
            --gold:     #FFCF01;
            --blue:     #4699C2;
            --bg-dark:  #1a0a10;
            --bg-med:   #2a1420;
            --bg-panel: #2d1620;
            --text:     #f0ebe6;
            --text-dim: #9D9FA2;
            --green:    #4a9b6a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* ── Header ──────────────────────────────────────────────────── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0,0,0,0.55);
            border-bottom: 1px solid var(--cordovan);
            flex-shrink: 0;
            z-index: 10;
        }

        #header a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            transition: color .15s;
        }
        #header a:hover { color: var(--text); }

        #game-title {
            font-family: Georgia, serif;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
        }

        #hud {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-dim);
        }
        #hud b { color: var(--text); }

        /* ── Challenge banner ─────────────────────────────────────────── */
        #challenge-banner {
            padding: 9px 16px;
            background: rgba(74, 19, 38, 0.65);
            border-bottom: 1px solid rgba(163,0,70,.35);
            text-align: center;
            font-size: 14px;
            flex-shrink: 0;
            z-index: 10;
        }
        #challenge-banner .pfx { color: var(--text-dim); }
        #challenge-banner .lbl {
            color: var(--gold);
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1px;
        }

        /* ── Game area ────────────────────────────────────────────────── */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 12px;
            overflow: hidden;
        }

        /* ── Flash overlay ────────────────────────────────────────────── */
        #flash-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 40;
            background: transparent;
            transition: background-color .1s;
        }

        /* ── Grid ─────────────────────────────────────────────────────── */
        #grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            padding: 10px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
        }

        .cell {
            width: 100px;
            height: 56px;
            border-radius: 7px;
            border: 1px solid rgba(255,255,255,0.13);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            padding: 4px 5px;
            line-height: 1.25;
            background: #1e0d17;
            color: var(--text);
            overflow: hidden;
        }

        .cell.empty {
            background: rgba(255,255,255,0.015);
            border-color: rgba(255,255,255,0.04);
        }

        .cell.has-player {
            box-shadow: 0 0 0 2px var(--green), 0 0 0 3px rgba(0,0,0,0.6);
        }

        .cell-text {
            position: relative;
            z-index: 1;
            pointer-events: none;
            word-break: break-word;
        }

        /* ── Player ───────────────────────────────────────────────────── */
        .player-sprite {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            z-index: 3;
        }
        .player-sprite.blink {
            animation: blink .3s step-end infinite;
        }

        /* ── Enemy (Dr. Bailey) ───────────────────────────────────────── */
        .enemy-sprite {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }
        .enemy-face {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-image: url('Clay Bailey 2.jpg');
            background-size: 200%;
            background-position: 50% 60%;
            border: 2px solid var(--cardinal);
            box-shadow: 0 0 10px rgba(163,0,70,.9), 0 0 20px rgba(163,0,70,.4);
            animation: bailey-bob 1.2s ease-in-out infinite;
        }
        @keyframes bailey-bob {
            0%,100% { transform: scale(1);   }
            50%      { transform: scale(1.08); }
        }

        /* ── Controls hint ────────────────────────────────────────────── */
        #controls-hint {
            color: rgba(255,255,255,.2);
            font-size: 11px;
            text-align: center;
            letter-spacing: .3px;
        }
        #controls-hint b { color: rgba(255,255,255,.38); }

        /* ── Start prompt ─────────────────────────────────────────────── */
        #start-prompt {
            color: rgba(255,255,255,.55);
            font-size: 13px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        /* ── Overlays ─────────────────────────────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.82);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 16px;
        }
        .overlay-panel {
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 18px;
            padding: 36px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,.65);
        }
        .ov-emoji  { font-size: 52px; margin-bottom: 12px; }
        .ov-title  { font-size: 22px; font-weight: bold; margin-bottom: 6px; font-family: Georgia, serif; }
        .ov-sub    { color: var(--text-dim); font-size: 13px; margin-bottom: 4px; }
        .ov-next   { color: var(--gold); font-weight: 700; font-size: 15px; margin-bottom: 20px; }
        .ov-score  { color: var(--gold); font-weight: bold; font-size: 22px; margin-bottom: 24px; }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: filter .15s;
            font-family: inherit;
        }
        .btn:hover { filter: brightness(1.18); }
        .btn-green { background: #2e7d4a; color: #fff; }
        .btn-dim   { background: rgba(255,255,255,.1); color: #fff; }
        .btn-row   { display: flex; gap: 10px; justify-content: center; }

        @keyframes blink {
            0%,100% { opacity: .5; }
            50%      { opacity: .1; }
        }
        @keyframes pulse {
            0%,100% { opacity: .45; }
            50%      { opacity: 1;   }
        }
    </style>
</head>

    </div>

// ── Helpers ────────────────────────────────────────────────────────────────
function posToIdx(p)   { return p.row * COLS + p.col; }
function idxToPos(i)   { return { row: Math.floor(i / COLS), col: i % COLS }; }
function posEq(a, b)   { return a.row === b.row && a.col === b.col; }

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function generateGrid(chal) {
    const correct   = chal.all.filter(x => x.c);
    const incorrect = chal.all.filter(x => !x.c);
    const nCorrect  = Math.min(6, correct.length);
    const cells = [];
    for (let i = 0; i < nCorrect; i++)
        cells.push({ ...correct[Math.floor(Math.random() * correct.length)] });
    for (let i = 0; i < CELL_COUNT - nCorrect; i++)
        cells.push({ ...incorrect[Math.floor(Math.random() * incorrect.length)] });
    return shuffle(cells);
}

// ── DOM refs ───────────────────────────────────────────────────────────────
const gridEl        = document.getElementById('grid');
const flashEl       = document.getElementById('flash-overlay');
const hudScore      = document.getElementById('hud-score');
const hudLives      = document.getElementById('hud-lives');
const hudLevel      = document.getElementById('hud-level');
const chalPfx       = document.getElementById('chal-pfx');
const chalLbl       = document.getElementById('chal-lbl');
const startPrompt   = document.getElementById('start-prompt');
const ovLevel       = document.getElementById('ov-level');
const ovGameover    = document.getElementById('ov-gameover');

// ── State ──────────────────────────────────────────────────────────────────
let grid, playerPos, enemies;
let score, lives, level, chalIdx;
let gameStatus, invincible, started;
let enemyTimer = null, flashTimer = null;

// ── Flash ──────────────────────────────────────────────────────────────────
function setFlash(type, ms) {
    flashEl.style.backgroundColor =
        type === 'correct' ? 'rgba(16,185,129,.12)' :
        type === 'wrong'   ? 'rgba(239,68,68,.18)'  : 'transparent';
    clearTimeout(flashTimer);
    if (ms) flashTimer = setTimeout(() => { flashEl.style.backgroundColor = 'transparent'; }, ms);
}

// ── HUD ────────────────────────────────────────────────────────────────────
function updateHUD() {
    hudScore.textContent = score;
    hudLevel.textContent = level;
    hudLives.textContent = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
}

// ── Build Level ────────────────────────────────────────────────────────────
function buildLevel(lvl, ci, curLives, curScore) {
    clearInterval(enemyTimer);

    const chal = CHALLENGES[ci % CHALLENGES.length];
    grid        = generateGrid(chal);
    playerPos   = { ...START };
    score       = curScore;
    lives       = curLives;
    level       = lvl;
    chalIdx     = ci;
    gameStatus  = 'playing';
    invincible  = false;
    started     = false;

    chalPfx.textContent = chal.pfx + ' ';
    chalLbl.textContent = chal.lbl;

    // Spawn enemies: 1 at level 1, +1 every 3 levels, max 4
    const count  = Math.min(1 + Math.floor((lvl - 1) / 3), 4);
    const taken  = new Set([posToIdx(START)]);
    enemies = [];
    for (let i = 0; i < count; i++) {
        let idx;
        do { idx = Math.floor(Math.random() * CELL_COUNT); } while (taken.has(idx));
        taken.add(idx);
        enemies.push({ id: i, pos: idxToPos(idx) });
    }

    ovLevel.style.display    = 'none';
    ovGameover.style.display = 'none';
    startPrompt.style.display = 'block';

    updateHUD();
    render();
}

// ── Enemy tick ─────────────────────────────────────────────────────────────
function startEnemyTimer() {
    clearInterval(enemyTimer);
    const speed = Math.max(350, 950 - (level - 1) * 40);
    enemyTimer = setInterval(tickEnemies, speed);
}

function tickEnemies() {
    if (gameStatus !== 'playing') return;

    const trackChance = Math.min(0.35 + (level - 1) * 0.04, 0.65);

    enemies = enemies.map(enemy => {
        const dirs = [
            {row:-1,col:0},{row:1,col:0},{row:0,col:-1},{row:0,col:1}
        ].filter(d => {
            const r = enemy.pos.row + d.row, c = enemy.pos.col + d.col;
            return r >= 0 && r < ROWS && c >= 0 && c < COLS;
        });
        if (!dirs.length) return enemy;

        let dir;
        if (Math.random() < trackChance) {
            const dr = playerPos.row - enemy.pos.row;
            const dc = playerPos.col - enemy.pos.col;
            const toward = Math.abs(dr) >= Math.abs(dc)
                ? { row: Math.sign(dr), col: 0 }
                : { row: 0, col: Math.sign(dc) };
            dir = dirs.find(d => d.row === toward.row && d.col === toward.col)
                || dirs[Math.floor(Math.random() * dirs.length)];
        } else {
            dir = dirs[Math.floor(Math.random() * dirs.length)];
        }
        return { ...enemy, pos: { row: enemy.pos.row + dir.row, col: enemy.pos.col + dir.col } };
    });

    if (!invincible && enemies.some(e => posEq(e.pos, playerPos))) {
        hitPlayer();
    }
    render();
}

// ── Player hit ─────────────────────────────────────────────────────────────
function hitPlayer() {
    const nl = lives - 1;
    setFlash('wrong', nl > 0 ? 1500 : 0);
    if (nl <= 0) {
        lives = 0;
        updateHUD();
        gameStatus = 'gameOver';
        clearInterval(enemyTimer);
        render();
        setTimeout(showGameOver, 500);
    } else {
        lives = nl;
        invincible = true;
        playerPos = { ...START };
        updateHUD();
        render();
        setTimeout(() => { invincible = false; render(); }, 1500);
    }
}

// ── Munch ──────────────────────────────────────────────────────────────────
function munchCell() {
    const idx  = posToIdx(playerPos);
    const cell = grid[idx];
    if (cell === null) return;

    grid[idx] = null;

    if (cell.c) {
        score += 10;
        setFlash('correct', 250);
        updateHUD();
        render();
        if (!grid.some(c => c !== null && c.c)) {
            gameStatus = 'levelComplete';
            clearInterval(enemyTimer);
            setTimeout(showLevelComplete, 350);
        }
    } else {
        score = Math.max(0, score - 5);
        const nl = lives - 1;
        setFlash('wrong', nl > 0 ? 1100 : 0);
        if (nl <= 0) {
            lives = 0;
            gameStatus = 'gameOver';
            clearInterval(enemyTimer);
            updateHUD();
            render();
            setTimeout(showGameOver, 600);
        } else {
            lives = nl;
            invincible = true;
            updateHUD();
            render();
            setTimeout(() => { invincible = false; render(); }, 1100);
        }
    }
}

// ── Overlays ───────────────────────────────────────────────────────────────
function showLevelComplete() {
    const nextChal = CHALLENGES[(chalIdx + 1) % CHALLENGES.length];
    document.getElementById('lc-title').textContent = `Level ${level} Clear!`;
    document.getElementById('lc-score').textContent = score;
    document.getElementById('lc-next').textContent  = nextChal.lbl;
    ovLevel.style.display = 'flex';
}

function showGameOver() {
    document.getElementById('go-level').textContent = `Reached Level ${level}`;
    document.getElementById('go-score').textContent = `Final Score: ${score}`;
    ovGameover.style.display = 'flex';
}

document.getElementById('btn-next').addEventListener('click', () => {
    buildLevel(level + 1, chalIdx + 1, lives, score);
});
document.getElementById('btn-again').addEventListener('click', () => {
    buildLevel(1, 0, 3, 0);
});
document.getElementById('btn-back').addEventListener('click', () => {
    window.location.href = 'index.html';
});

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', function (e) {
    const isArrow = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key);
    const isMunch = e.key === ' ' || e.key === 'Enter';
    if (!isArrow && !isMunch) return;
    e.preventDefault();

    if (!started) {
        started = true;
        startPrompt.style.display = 'none';
        startEnemyTimer();
        return;
    }

    if (gameStatus !== 'playing' || invincible) return;

    if (isMunch) { munchCell(); return; }

    // Movement
    const { row, col } = playerPos;
    let next = { row, col };
    if (e.key === 'ArrowUp')    next = { row: Math.max(0, row - 1), col };
    if (e.key === 'ArrowDown')  next = { row: Math.min(ROWS - 1, row + 1), col };
    if (e.key === 'ArrowLeft')  next = { row, col: Math.max(0, col - 1) };
    if (e.key === 'ArrowRight') next = { row, col: Math.min(COLS - 1, col + 1) };

    if (enemies.some(en => posEq(en.pos, next))) {
        hitPlayer();
        return;
    }

    playerPos = next;
    render();
});

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
    gridEl.innerHTML = '';

    grid.forEach((cell, idx) => {
        const pos        = idxToPos(idx);
        const isPlayer   = posEq(pos, playerPos);
        const enemyHere  = enemies.find(e => posEq(e.pos, pos));
        const isEmpty    = cell === null;

        const div = document.createElement('div');
        let cls = 'cell';
        if (isEmpty)                    cls += ' empty';
        if (isPlayer && !enemyHere)     cls += ' has-player';
        div.className = cls;

        // Text label
        if (!isEmpty) {
            const span = document.createElement('span');
            span.className = 'cell-text';
            span.textContent = cell.t;
            if (isPlayer && !enemyHere && invincible) span.style.opacity = '.25';
            div.appendChild(span);
        }

        // Player sprite (🧑‍🎓)
        if (isPlayer && !enemyHere) {
            const sp = document.createElement('div');
            sp.className = 'player-sprite' + (invincible ? ' blink' : '');
            sp.textContent = '🧑‍🎓';
            div.appendChild(sp);
        }

        // Dr. Bailey enemy
        if (enemyHere) {
            const sp   = document.createElement('div');
            sp.className = 'enemy-sprite';
            const face = document.createElement('div');
            face.className = 'enemy-face';
            sp.appendChild(face);
            div.appendChild(sp);
        }

        gridEl.appendChild(div);
    });
}

// ── Init ───────────────────────────────────────────────────────────────────
buildLevel(1, 0, 3, 0);

})();
</script>
</body>
</html>
